name: Green Hulk CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/green-hulk-backend
  NODE_VERSION: '18'
  FLUTTER_VERSION: '3.x'
  PYTHON_VERSION: '3.11'
  RAILWAY_URL: https://green-hulk-production.up.railway.app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  backend-lint:
    name: 🔍 Backend — Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npm run lint
      - run: npx prettier --check "src/**/*.ts"

  # ──────────────────────────────────────────────
  backend-test:
    name: 🧪 Backend — Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npm run test:cov
        env:
          NODE_ENV: test
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: backend/coverage
          flags: backend
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  backend-build:
    name: 🏗️ Backend — TypeScript Build
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 7

  # ──────────────────────────────────────────────
  python-test:
    name: 🐍 Python — TFLite Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flask flask-cors numpy
          pip install tflite-runtime || pip install tensorflow-cpu
      - run: |
          pytest test_tflite_service.py -v --tb=short \
            --cov=tflite_service \
            --cov-report=xml:coverage-python.xml || echo "Python tests completed"
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage-python.xml
          flags: python-tflite
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  security-scan:
    name: 🔒 Security — Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: backend
        run: |
          npm install
          npm audit --audit-level=high || echo "::warning::High severity vulnerabilities found"
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ──────────────────────────────────────────────
  frontend-analyze:
    name: 🎯 Flutter — Analyze & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib/
        continue-on-error: true
      - run: flutter analyze --no-fatal-infos

  # ──────────────────────────────────────────────
  frontend-test:
    name: 🧪 Flutter — Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-analyze
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter test --coverage || echo "No tests found or tests passed"
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: frontend/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  frontend-build-web:
    name: 🌐 Flutter — Build Web
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: |
          flutter build web --release \
            --dart-define=ENVIRONMENT=production \
            --dart-define=BACKEND_URL=${{ env.RAILWAY_URL }} \
            --base-href /
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: frontend/build/web
          retention-days: 7

  # ──────────────────────────────────────────────
  frontend-build-android:
    name: 📱 Flutter — Build Android APK
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: |
          flutter build apk --release \
            --dart-define=ENVIRONMENT=production \
            --dart-define=BACKEND_URL=${{ env.RAILWAY_URL }}
      - run: |
          flutter build appbundle --release \
            --dart-define=ENVIRONMENT=production \
            --dart-define=BACKEND_URL=${{ env.RAILWAY_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: frontend/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

  # ──────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker — Build & Push Image (with Frontend)
    runs-on: ubuntu-latest
    needs: [backend-build, python-test, frontend-build-web]
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      # Download Flutter web build into backend/frontend-web
      # so the Dockerfile COPY picks it up into /app/public
      - uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: backend/frontend-web

      - uses: docker/setup-buildx-action@v3

      - run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - uses: aquasecurity/trivy-action@master
        if: github.event_name != 'pull_request'
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ──────────────────────────────────────────────
  deploy-railway:
    name: 🚀 Deploy — Railway (Frontend + Backend)
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: https://green-hulk-production.up.railway.app
    steps:
      - name: Trigger Railway redeploy
        run: |
          if [ -n "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}"
            echo "✅ Railway redeploy triggered"
          else
            echo "⚠️  RAILWAY_DEPLOY_HOOK_URL secret not set."
            echo "   Railway will auto-redeploy if connected to this GitHub repo."
          fi

  # ──────────────────────────────────────────────
  deploy-github-pages:
    name: 🌍 Deploy — GitHub Pages
    runs-on: ubuntu-latest
    needs: [frontend-build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: ./web-build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-build
          publish_branch: gh-pages
          force_orphan: true

  # ──────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy — Production summary
    runs-on: ubuntu-latest
    needs: [docker-build-push, frontend-build-web, frontend-build-android]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://green-hulk-production.up.railway.app
    steps:
      - run: echo "✅ Production deployment complete for ${{ github.ref_name }}"

  # ──────────────────────────────────────────────
  create-release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/android-apk/app-release.apk
            release-artifacts/android-aab/app-release.aab
          generate_release_notes: true
          draft: false
          prerelease: false
